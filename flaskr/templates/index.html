{% extends 'base.html' %}

{% block title %}
    Awesome Library
{% endblock %}

{% block content %}

    {% for book in book_list %}
    <h1>Hello world!</h1>
        <div class="book__card">
            <h1>{{ book['ISBN'] }}</h1>
            <a href="{{ url_for('book_page', ISBN=book['ISBN'] )}}">{{ book['Title'] }}</a>
            <h2> {{ book['Author'] }}</h2>

            <img src="{{ book['Image'] }} " alt="Photo of spongebob">
        </div>
    {% endfor %}

{% endblock %}
