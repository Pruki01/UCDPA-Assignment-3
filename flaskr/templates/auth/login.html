{% extends 'base.html'}

    {% block title %}
        Log In
    {% endblock %}

    {% block content %}
        <h1>Log In</h1>

        <form method="post">
            <label for="email">Email</label>
            <input type="text" name="email" id="email" required>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
            <input type="submit" value="Log In">
        </form>
    {% endblock %}

{% endblock %}
